<!DOCTYPE html>
<html>
<head>
    <title>Limpar Cache - Fenda Music</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #fff;
            padding: 40px;
            text-align: center;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(167, 139, 250, 0.1);
            border: 2px solid #a78bfa;
            border-radius: 12px;
            padding: 30px;
        }
        
        h1 {
            color: #a78bfa;
            margin-bottom: 20px;
        }
        
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.3);
        }
        
        .status.ok {
            background: rgba(52, 211, 153, 0.1);
            border-left: 4px solid #34d399;
            color: #34d399;
        }
        
        .status.working {
            background: rgba(96, 165, 250, 0.1);
            border-left: 4px solid #60a5fa;
            color: #60a5fa;
        }
        
        .status.error {
            background: rgba(248, 113, 113, 0.1);
            border-left: 4px solid #f87171;
            color: #f87171;
        }
        
        button {
            background: #a78bfa;
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin: 10px 5px;
        }
        
        button:active {
            opacity: 0.8;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧹 Limpar Cache do App</h1>
        
        <div id="status"></div>
        
        <div>
            <button onclick="cleanCache()">Limpar Cache e Recarregar</button>
            <button onclick="location.href = '/'">Cancelar</button>
        </div>
        
        <p style="margin-top: 20px; font-size: 12px; color: rgba(255,255,255,0.6);">
            Isto vai desregistrar todos os Service Workers<br>
            e limpar o cache do navegador.
        </p>
    </div>

    <script>
        function addStatus(message, type = 'working') {
            const status = document.getElementById('status');
            const div = document.createElement('div');
            div.className = `status ${type}`;
            
            if (type === 'working') {
                div.innerHTML = `<span class="spinner"></span> ${message}`;
            } else {
                div.innerHTML = message;
            }
            
            status.appendChild(div);
        }

        async function cleanCache() {
            try {
                addStatus('🔍 Procurando Service Workers...', 'working');

                if (!('serviceWorker' in navigator)) {
                    addStatus('❌ Service Worker não suportado', 'error');
                    return;
                }

                const registrations = await navigator.serviceWorker.getRegistrations();
                addStatus(`✅ Encontrados ${registrations.length} Service Worker(s)`, 'ok');

                if (registrations.length > 0) {
                    addStatus('🧹 Desregistrando...', 'working');
                    
                    for (const reg of registrations) {
                        await reg.unregister();
                        addStatus(`✅ Desregistrado: ${reg.scope}`, 'ok');
                    }
                }

                addStatus('🗑️ Limpando caches...', 'working');
                
                const cacheNames = await caches.keys();
                addStatus(`✅ Encontrados ${cacheNames.length} cache(s)`, 'ok');

                for (const cacheName of cacheNames) {
                    await caches.delete(cacheName);
                    addStatus(`✅ Cache deletado: ${cacheName}`, 'ok');
                }

                addStatus('💾 Limpando localStorage...', 'working');
                
                const keysToRemove = [
                    'fenda_displayed_notifications',
                    'fenda_realtime_notifications',
                    'fenda_notifications',
                    'user_name',
                    'fenda_history_',
                    'fenda_totaltime_',
                    'fenda_username_'
                ];

                keysToRemove.forEach(key => {
                    Object.keys(localStorage).forEach(k => {
                        if (k.includes(key)) {
                            localStorage.removeItem(k);
                            addStatus(`✅ localStorage removido: ${k}`, 'ok');
                        }
                    });
                });

                addStatus('✅ Limpeza concluída!', 'ok');
                addStatus('🔄 Recarregando em 2 segundos...', 'working');

                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);

            } catch (error) {
                addStatus(`❌ Erro: ${error.message}`, 'error');
            }
        }

        // Auto-limpar ao carregar
        setTimeout(() => {
            cleanCache();
        }, 500);
    </script>
</body>
</html>
