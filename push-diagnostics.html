<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 Diagnóstico de Notificações - Fenda Music</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 16px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 24px;
            text-align: center;
            color: #a78bfa;
        }
        
        .test-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(167, 139, 250, 0.2);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
        }
        
        .test-title {
            font-weight: 600;
            margin-bottom: 12px;
            color: #a78bfa;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .test-result {
            font-size: 14px;
            line-height: 1.6;
            padding: 8px;
            border-radius: 8px;
            margin: 8px 0;
            background: rgba(0, 0, 0, 0.2);
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }
        
        .status-ok {
            color: #34d399;
            background: rgba(52, 211, 153, 0.1);
            border-left: 3px solid #34d399;
        }
        
        .status-error {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
            border-left: 3px solid #f87171;
        }
        
        .status-warning {
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
            border-left: 3px solid #fbbf24;
        }
        
        .status-info {
            color: #60a5fa;
            background: rgba(96, 165, 250, 0.1);
            border-left: 3px solid #60a5fa;
        }
        
        button {
            background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            transition: transform 0.2s;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .emoji {
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Diagnóstico de Notificações</h1>
        
        <div id="tests">
            <div class="test-section">
                <div class="test-title">
                    <span class="spinner"></span>
                    Carregando diagnósticos...
                </div>
            </div>
        </div>
    </div>

    <script>
        const TestResults = {
            results: [],
            
            add(title, emoji, status, message) {
                this.results.push({ title, emoji, status, message });
                this.render();
            },
            
            render() {
                const container = document.getElementById('tests');
                container.innerHTML = this.results.map(r => `
                    <div class="test-section">
                        <div class="test-title">
                            <span class="emoji">${r.emoji}</span>
                            ${r.title}
                        </div>
                        <div class="test-result status-${r.status}">
                            ${r.message}
                        </div>
                    </div>
                `).join('');
            }
        };
        
        async function runDiagnostics() {
            TestResults.results = [];
            
            // ========== TESTE 1: Scripts Carregados ==========
            if (typeof window.pushNotifications !== 'undefined') {
                TestResults.add('Push Script', '✅', 'ok', 
                    'push-notifications-client carregado');
            } else {
                TestResults.add('Push Script', '❌', 'error', 
                    'CRÍTICO: Script NÃO foi carregado. Verifique se player.html foi atualizado');
            }
            
            if (typeof FendaNotifications !== 'undefined') {
                TestResults.add('FendaNotifications', '✅', 'ok', 
                    'Módulo de notificações do app está disponível');
            } else {
                TestResults.add('FendaNotifications', '❌', 'error', 
                    'CRÍTICO: notifications.js não foi carregado');
            }
            
            // ========== TESTE 2: Supabase ==========
            if (typeof supabaseClient !== 'undefined') {
                TestResults.add('Supabase Client', '✅', 'ok', 
                    'Supabase carregado');
            } else {
                TestResults.add('Supabase Client', '❌', 'error', 
                    'CRÍTICO: supabaseClient não existe');
            }
            
            // ========== TESTE 3: Autenticação ==========
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    TestResults.add('Autenticação', '✅', 'ok', 
                        `Autenticado como: ${session.user.email}`);
                } else {
                    TestResults.add('Autenticação', '⚠️', 'warning', 
                        'Não autenticado. Faça login primeiro');
                }
            } catch (e) {
                TestResults.add('Autenticação', '❌', 'error', 
                    `Erro: ${e.message}`);
            }
            
            // ========== TESTE 4: AppState ==========
            if (typeof AppState !== 'undefined') {
                const userName = AppState?.userProfile?.full_name || 'vazio';
                TestResults.add('AppState', '✅', 'ok', 
                    `Carregado. Nome do usuário: ${userName}`);
            } else {
                TestResults.add('AppState', '❌', 'error', 
                    'AppState não encontrado');
            }
            
            // ========== TESTE 5: Service Worker ==========
            if ('serviceWorker' in navigator) {
                try {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    if (regs.length > 0) {
                        TestResults.add('Service Worker', '✅', 'ok', 
                            `${regs.length} SW registrado(s)`);
                    } else {
                        TestResults.add('Service Worker', '⚠️', 'warning', 
                            'Nenhum SW registrado');
                    }
                } catch (e) {
                    TestResults.add('Service Worker', '❌', 'error', 
                        `Erro: ${e.message}`);
                }
            } else {
                TestResults.add('Service Worker', '❌', 'error', 
                    'Navegador não suporta SW');
            }
            
            // ========== TESTE 6: Notificações Nativas ==========
            if ('Notification' in window) {
                const perm = Notification.permission;
                if (perm === 'granted') {
                    TestResults.add('Permissão Nativa', '✅', 'ok', 
                        'Permissão concedida');
                } else if (perm === 'denied') {
                    TestResults.add('Permissão Nativa', '❌', 'error', 
                        'Permissão negada. Vá em Configurações > Site > Notificações');
                } else {
                    TestResults.add('Permissão Nativa', '⚠️', 'warning', 
                        'Ainda não solicitada');
                }
            } else {
                TestResults.add('Permissão Nativa', '❌', 'error', 
                    'Navegador não suporta Notification API');
            }
            
            // ========== TESTE 7: Mensagens Pendentes ==========
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (!session) {
                    TestResults.add('Mensagens Pendentes', '⚠️', 'warning', 
                        'Não autenticado, não pode verificar');
                } else {
                    const { data: deliveries, error } = await supabaseClient
                        .from('message_deliveries')
                        .select('id, status')
                        .eq('user_id', session.user.id)
                        .eq('status', 'pending')
                        .limit(10);
                    
                    if (error) {
                        TestResults.add('Mensagens Pendentes', '❌', 'error', 
                            `Erro na query: ${error.message}`);
                    } else if (deliveries && deliveries.length > 0) {
                        TestResults.add('Mensagens Pendentes', '✅', 'ok', 
                            `${deliveries.length} notificação(ões) esperando`);
                    } else {
                        TestResults.add('Mensagens Pendentes', 'ℹ️', 'info', 
                            'Nenhuma notificação pendente (envie uma do admin)');
                    }
                }
            } catch (e) {
                TestResults.add('Mensagens Pendentes', '❌', 'error', 
                    `Erro: ${e.message}`);
            }
            
            // ========== TESTE 8: Polling Ativo ==========
            if (typeof window.pushNotifications?.startPolling === 'function') {
                TestResults.add('Polling', '✅', 'ok', 
                    'Função startPolling está disponível');
            } else {
                TestResults.add('Polling', '❌', 'error', 
                    'startPolling não está disponível');
            }
            
            // ========== ADICIONAR BOTÃO DE TESTE ==========
            const testBtn = document.createElement('div');
            testBtn.style.marginTop = '24px';
            testBtn.innerHTML = `
                <button onclick="testPushNotification()">
                    📬 Testar Notificação Local
                </button>
            `;
            document.getElementById('tests').appendChild(testBtn);
        }
        
        // Executar diagnósticos ao carregar
        window.addEventListener('load', runDiagnostics);
        
        // Função para testar notificação
        window.testPushNotification = async function() {
            try {
                if (typeof FendaNotifications === 'undefined') {
                    alert('❌ FendaNotifications não disponível');
                    return;
                }
                
                FendaNotifications.add({
                    type: 'system',
                    title: '✅ Teste de Notificação',
                    body: 'Se você vê isto, o sistema está funcionando!',
                    icon: 'notifications',
                    iconBg: '#34d399'
                });
                
                alert('✅ Notificação de teste adicionada. Verifique a aba de Notificações');
            } catch (e) {
                alert(`❌ Erro: ${e.message}`);
            }
        };
    </script>
</body>
</html>
